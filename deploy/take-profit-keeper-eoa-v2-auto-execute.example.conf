[Service]
# Copy these non-secret variables into the systemd drop-in only for one small,
# deliberate Monad Testnet execution. Keep EOA_V2_AUTO_EXECUTE=false otherwise.
Environment=EOA_V2_AUTO_EXECUTE=false
Environment=EOA_V2_AUTO_EXECUTE_CONFIRMATION=MONAD_TESTNET_JAMES_V2_ONCE
Environment=EOA_V2_AUTO_EXECUTE_POLICY_ID=0
Environment=EOA_V2_AUTO_EXECUTE_MAX_AMOUNT=0.01
Environment=EOA_V2_AUTO_EXECUTE_MAX_GAS=300000
