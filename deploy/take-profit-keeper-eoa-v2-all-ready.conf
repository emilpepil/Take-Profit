[Service]
# User-authorized Monad Testnet run: execute every active JAMES V2 level whose
# target has been reached. Each level is simulated and sent separately.
Environment=EOA_JAMES_EXECUTOR_V2=0xb8467CAc60cE9087407942c7812820351436bAea
Environment=EOA_RULE_OWNER=0x55dB95b0772633664Ba1F482741fe4DD22e0d8bB
Environment=AUTO_EXECUTE=false
Environment=KEEPER_TELEGRAM_ENABLED=true
Environment=EOA_V2_AUTO_EXECUTE=false
Environment=EOA_V2_AUTO_EXECUTE_ALL=true
Environment=EOA_V2_AUTO_EXECUTE_CONFIRMATION=MONAD_TESTNET_JAMES_V2_ALL
# Default fallback for levels created before per-rule gas settings existed.
Environment=EOA_V2_AUTO_EXECUTE_MAX_GAS=320000
# Current reached levels: 3 + 5 + 2 JAMES. The keeper refuses a larger batch.
Environment=EOA_V2_AUTO_EXECUTE_ALL_MAX_TOTAL_AMOUNT=10
