[Service]
# EOA take-profit V2 rules to inspect from the existing keeper loop.
# These values are public addresses; secrets remain in the existing .env file.
Environment=EOA_JAMES_EXECUTOR_V2=0xb8467cac60ce9087407942c7812820351436baea
Environment=EOA_RULE_OWNER=0x55db95b0772633664ba1f482741fe4dd22e0d8bb

# Safety rails for the hackathon testnet keeper.
Environment=AUTO_EXECUTE=false
Environment=KEEPER_TELEGRAM_ENABLED=false

# V2 execution is separately opt-in and stays disabled. It must be armed with
# an exact policy ID, a maximum token amount, and a second confirmation phrase.
Environment=EOA_V2_AUTO_EXECUTE=false
